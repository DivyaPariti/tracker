<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divya Pariti — Work Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #5a5a56;
      --text-muted: #9a9a94;
      --surface-alt: #f2f1ee;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --text-primary: #f0efe8;
        --text-secondary: #a8a8a0;
        --text-muted: #6a6a64;
        --surface-alt: #282826;
      }
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
    }

    .dash { max-width: 1200px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .header h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 52px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .week-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface-alt);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 5px 12px;
      color: var(--text-secondary);
      margin-top: 10px;
    }
    .header-rule {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.25rem 0 1.75rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 38px; }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 30px; }
      body { padding: 1.5rem 1rem 3rem; }
    }

    /* ── Pillar card ── */
    .pillar {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .pillar-header {
      padding: 14px 16px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .pillar-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .pillar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .pillar-body { padding: 14px 16px; flex: 1; }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      margin-top: 14px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Checkbox items ── */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }
    .item input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      cursor: pointer;
    }
    .item-text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item.done .item-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* ── Ongoing dots ── */
    .dot-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .dot-item .item-text {
      color: var(--text-primary);
    }

    /* ── Impact box ── */
    .impact-box {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--surface-alt);
    }
    .impact-box .section-label { margin: 0 0 4px; }
    .impact-box p { font-size: 11.5px; color: var(--text-secondary); line-height: 1.5; }

    /* ── Colour tokens ── */
    .blue-tag   { background: #E6F1FB; color: #185FA5; }
    .teal-tag   { background: #E1F5EE; color: #0F6E56; }
    .amber-tag  { background: #FAEEDA; color: #854F0B; }
    .purple-tag { background: #EEEDFE; color: #534AB7; }

    .blue-dot   { background: #378ADD; }
    .teal-dot   { background: #1D9E75; }
    .amber-dot  { background: #BA7517; }
    .purple-dot { background: #7F77DD; }

    @media (prefers-color-scheme: dark) {
      .blue-tag   { background: #0C447C; color: #B5D4F4; }
      .teal-tag   { background: #085041; color: #9FE1CB; }
      .amber-tag  { background: #633806; color: #FAC775; }
      .purple-tag { background: #3C3489; color: #CECBF6; }
    }
  </style>
</head>
<body>
<div class="dash">

  <!-- ════ HEADER ════ -->
  <div class="header">
    <h1>Divya Pariti</h1>
    <p>Marketing Technology Graduate &middot; Intuition</p>
    <div class="week-badge" id="weekLabel">Week of —</div>
  </div>
  <hr class="header-rule" />

  <!-- ════ GRID ════ -->
  <div class="grid" id="grid"></div>

</div>

<script>
/*
  ══════════════════════════════════════════════════════
  DATA — Edit this section each week.

  done[]    → completed items (tickable checkboxes)
  ongoing[] → active workstreams (bullet dots)
  impact    → expected outcome summary
  ══════════════════════════════════════════════════════
*/
const pillars = [
  {
    tag: "Search performance",
    tagClass: "blue-tag", dotClass: "blue-dot",
    title: "Search performance",
    done: [
      "Developed AI-driven search strategy framework (zero-click & conversion SEO)",
      "Keyword research via Moz — niche opps aligned to product offerings (Know-How)",
      "Identified high-performing keywords & shaped optimised content titles (Workplace Now)",
      "Established structured keyword research & content planning approach across initiatives",
    ],
    ongoing: [
      "Expand keywords into structured clusters & pillar-based content aligned to offerings",
      "Apply AI-aware SEO practices for zero-click & AI-driven search environments",
    ],
    impact: "Stronger visibility in AI-driven & traditional search through intent-aligned content"
  },
  {
    tag: "Website performance",
    tagClass: "teal-tag", dotClass: "teal-dot",
    title: "Website performance",
    done: [
      "Developed Core Web Vitals strategy framework linking UX & search visibility",
      "Built & optimised WordPress pages & pillar content following SEO best practices",
      "Identified WordPress bottlenecks — themes, plugins & media impacting Core Web Vitals",
      "Defined performance standards: image handling, page structure & technical practices",
      "Evaluated & tested lighter WordPress theme for speed & UX (paused — team changes)",
    ],
    ongoing: [
      "Drive Core Web Vitals via theme optimisation, media handling & technical refinements",
      "Progress evaluation & potential migration to lighter WordPress setup for global perf",
    ],
    impact: "Better site speed, UX & search rankings for higher engagement and conversion"
  },
  {
    tag: "Data management",
    tagClass: "amber-tag", dotClass: "amber-dot",
    title: "Data management",
    done: [
      "Built data quality framework: standards, risks & best practices for CRM reliability",
      "Manage centralised weekly tracker: social, email, leads & engagement metrics",
      "Identified HubSpot issues: duplicate records, incomplete fields & inconsistent structures",
      "Analysed email performance — high bounce rates flagged as key deliverability risk",
      "Implemented suppression segments for bounced, stale & high-risk contacts",
      "Created HubSpot dashboard: delivery, engagement & campaign-level metric visibility",
      "Translated data quality insights into cleanup, standardisation & segmentation actions",
    ],
    ongoing: [
      "Implement structured data cleanup, validation & standardisation processes in HubSpot",
      "Enhance segmentation logic & data structure for better targeting & reporting accuracy",
    ],
    impact: "Reliable segmentation, reporting & campaign execution through better data governance"
  },
  {
    tag: "Lead ops & revenue",
    tagClass: "purple-tag", dotClass: "purple-dot",
    title: "Lead ops & revenue",
    done: [
      "Developed lead ops & revenue mapping framework from marketing-to-sales visibility gaps",
      "Manage LinkedIn for Intuition Now: top-of-funnel demand gen & audience growth",
      "Maintain structured inbound lead visibility & weekly performance trend tracking",
      "Took ownership of finance newsletter: blog, email, social & podcast channels",
      "Executed cross-platform content distribution — YouTube, Spotify & Apple Podcasts",
      "Defined CRM requirements: dashboard structures, lead attribution & reporting needs",
      "Supported early-stage HubSpot–Microsoft Dynamics 365 integration planning",
    ],
    ongoing: [
      "Support HubSpot–Dynamics 365 integration through field mapping & sync logic definition",
      "Develop lifecycle tracking & attribution frameworks connecting lead gen to revenue",
      "Build CRM dashboards: lead attribution, campaign performance & pipeline contribution",
    ],
    impact: "End-to-end visibility from marketing to revenue — improved lead quality & pipeline efficiency"
  }
];

const checked = {};

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = pillars.map((p, pi) => `
    <div class="pillar">
      <div class="pillar-header">
        <span class="pillar-tag ${p.tagClass}">${p.tag}</span>
        <div class="pillar-title">${p.title}</div>
      </div>
      <div class="pillar-body">
        <div class="section-label">Completed</div>
        ${p.done.map((item, i) => `
          <label class="item" id="item-${pi}-${i}" title="${item}">
            <input type="checkbox" id="cb-${pi}-${i}" onchange="toggle(${pi},${i},this.checked)">
            <span class="item-text">${item}</span>
          </label>
        `).join('')}
        <div class="section-label">In progress</div>
        ${p.ongoing.map(item => `
          <div class="dot-item" title="${item}">
            <div class="dot ${p.dotClass}"></div>
            <span class="item-text">${item}</span>
          </div>
        `).join('')}
        <div class="impact-box">
          <div class="section-label">Expected impact</div>
          <p>${p.impact}</p>
        </div>
      </div>
    </div>
  `).join('');
}

function toggle(pi, i, val) {
  checked[pi + '-' + i] = val;
  const el = document.getElementById('item-' + pi + '-' + i);
  if (el) el.className = 'item' + (val ? ' done' : '');
}

(function setWeek() {
  const today = new Date();
  const opts = { month: 'short', day: 'numeric', year: 'numeric' };
  document.getElementById('weekLabel').textContent =
    'Week of ' + today.toLocaleDateString('en-GB', opts);
})();

render();
</script>
</body>
</html>
